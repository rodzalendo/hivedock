name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Go test + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: go vet
        run: go vet ./internal/... ./cmd/...
      - name: go test
        run: go test ./internal/... ./cmd/...

  analysis:
    name: staticcheck + govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2024.1.1
          staticcheck ./internal/... ./cmd/...
      # Advisory only: the Docker SDK + otel deps are pinned to the self-consistent
      # Go 1.23 set on purpose (see go.mod), so a fix can require a toolchain bump
      # we take deliberately — not automatically on every advisory.
      - name: govulncheck (advisory)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gates:
    name: Security grep gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Untrusted strings (container logs, hivedock.description labels) must
      # never reach innerHTML. All dynamic content renders as React text nodes.
      - name: No dangerouslySetInnerHTML
        run: |
          if grep -rn "dangerouslySetInnerHTML" web/src; then
            echo "::error::dangerouslySetInnerHTML is banned — render as text nodes"
            exit 1
          fi

      # No shell interpolation in non-test Go (invariant 9 / HARDENING.md §4.3):
      # exec.Command argument arrays only — never `sh -c` and never a shell
      # container entrypoint. The self-update helper is now a `hivedock
      # apply-update` subcommand instead of a `sh -c` compose pipeline.
      - name: No shell exec in Go
        run: |
          if grep -rnE '"(sh|bash)"[[:space:]]*,[[:space:]]*"-c"|"--entrypoint"[[:space:]]*,[[:space:]]*"(sh|bash)"' --include='*.go' --exclude='*_test.go' cmd internal; then
            echo "::error::shell exec (sh -c / shell entrypoint) is banned in non-test Go — use exec.Command argument arrays"
            exit 1
          fi

  frontend:
    name: Web typecheck + test + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: typecheck
        run: npx tsc --noEmit
      - name: test
        run: npm run test
      - name: lint
        run: npm run lint

  image:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          build-args: VERSION=ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
