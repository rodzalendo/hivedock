name: Release

# Publishes multi-arch images to GHCR and cosign-signs them:
#   - push tag vX.Y.Z    -> :X.Y.Z, :X.Y, :latest
#
# Releases are cut from tags only. There is no rolling tag: a push to main
# publishes nothing, so :latest always points at a deliberate, versioned
# release rather than whatever landed last. (A :edge tag tracking main used to
# exist and was removed — don't reintroduce it.)
#
# Every pushed digest is signed keyless via GitHub Actions OIDC (no long-lived
# key material — the trust root is this workflow's identity), and carries SLSA
# provenance + an SBOM. HiveDock's in-app self-update verifies these signatures
# before offering or applying an update (docs/HARDENING.md §3).
#
# NOTE: harden further in repo settings — protect the v* tags, require a reviewer
# on the `release` environment below, and (recommended) pin these actions by SHA.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign signing via the ambient OIDC token

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release # gate releases with a required reviewer (configure in repo settings)
    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.meta.outputs.version }}
          provenance: mode=max # SLSA provenance attestation on the index
          sbom: true # SPDX SBOM attestation
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published digest (keyless)
        # Sign the manifest-index digest once; it covers every tag that points at
        # it. This is exactly what the in-app check verifies (tag -> digest ->
        # cosign verify against this workflow's identity).
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"

  # Every vX.Y.Z tag also gets a GitHub Release with notes generated from the
  # commits since the previous release (edit on GitHub afterwards if needed).
  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
