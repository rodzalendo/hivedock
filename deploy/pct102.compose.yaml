# Copy to /opt/hivedock/compose.yaml on PCT 102 for the first deploy, then:
#   docker compose pull && docker compose up -d
# See docs/DEPLOYMENT.md. STACKS_DIR points at /opt/stacks-test.
# Releases are cut from vX.Y.Z tags only (:X.Y.Z, :X.Y, :latest) — there is no
# rolling tag. To test an unreleased build here, deploy a specific :X.Y.Z.
services:
  hivedock:
    image: ghcr.io/rodzalendo/hivedock:latest
    container_name: hivedock
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /opt/stacks-test:/opt/stacks-test   # same path inside and out — required
    environment:
      - STACKS_DIR=/opt/stacks-test
      - DATA_DIR=/app/data
      - LOG_LEVEL=info
      # Auth is ON (first-run setup at the login screen). AUTH_DISABLED was
      # removed — the container refuses to boot if it's still set.
