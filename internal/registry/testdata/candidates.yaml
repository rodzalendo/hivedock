# Real-world image:tag candidate-selection cases for the semver engine
# (internal/registry/semver.go). Per the PLAN risk register, semver edge cases
# are the trust-killer, so this corpus is written FIRST and the engine must
# satisfy every case before any UI or registry-network work. Add new cases here
# as they turn up in the wild — this file is the contract.
#
# Rules encoded:
#   - prefix preservation (arch prefixes like arm64v8-, a leading v)
#   - suffix preservation (-alpine, -ubuntu, …): never cross suffixes
#   - part-count preservation (16 vs 16.4 are different tracks)
#   - numeric (not lexical) comparison (1.10 > 1.9)
#   - signature/attestation tag exclusion (sha256-…, *.sig)
#   - diff classification: first differing component -> major/minor/patch
#   - only strictly-greater candidates; pick the greatest
#
# want: "" means no candidate (engine returns ok=false); the digest path (later)
# covers mutable tags like `latest`.

cases:
  - name: patch bump
    current: "1.2.3"
    available: ["1.2.3", "1.2.4"]
    want: "1.2.4"
    diff: patch

  - name: minor bump
    current: "1.2.3"
    available: ["1.2.3", "1.3.0"]
    want: "1.3.0"
    diff: minor

  - name: major bump
    current: "1.2.3"
    available: ["1.2.3", "2.0.0"]
    want: "2.0.0"
    diff: major

  - name: already newest
    current: "1.2.4"
    available: ["1.2.3", "1.2.4"]
    want: ""

  - name: pick greatest among many (jellyfin-like)
    current: "10.8.12"
    available: ["10.8.10", "10.8.12", "10.8.13", "10.9.0"]
    want: "10.9.0"
    diff: minor

  - name: minor preferred over patch (both newer)
    current: "1.2.3"
    available: ["1.2.4", "1.3.0"]
    want: "1.3.0"
    diff: minor

  - name: postgres single-part track (16 -> 17, not 16.4)
    current: "16"
    available: ["15", "16", "17", "16.4"]
    want: "17"
    diff: major

  - name: postgres two-part track major
    current: "16.4"
    available: ["16", "16.4", "16.5", "17.0", "16.4.1"]
    want: "17.0"
    diff: major

  - name: postgres two-part track minor
    current: "16.4"
    available: ["16.4", "16.5", "16.6"]
    want: "16.6"
    diff: minor

  - name: v-prefix preserved, patch
    current: "v1.2.3"
    available: ["v1.2.3", "v1.2.4", "1.3.0"]
    want: "v1.2.4"
    diff: patch

  - name: v-prefix preserved, major
    current: "v1.2.3"
    available: ["v1.2.3", "v2.0.0"]
    want: "v2.0.0"
    diff: major

  - name: v-prefix single-part
    current: "v16"
    available: ["v16", "v17", "v16.4"]
    want: "v17"
    diff: major

  - name: alpine suffix preserved
    current: "1.2.3-alpine"
    available: ["1.2.3-alpine", "1.2.4-alpine", "1.2.4"]
    want: "1.2.4-alpine"
    diff: patch

  - name: never cross into a suffix
    current: "1.2.3"
    available: ["1.2.3", "1.2.4-alpine"]
    want: ""

  - name: never cross out of a suffix
    current: "1.2.3-alpine"
    available: ["1.2.3-alpine", "1.2.4"]
    want: ""

  - name: ubuntu suffix preserved
    current: "1.2.3-ubuntu"
    available: ["1.2.3-ubuntu", "1.2.4-ubuntu"]
    want: "1.2.4-ubuntu"
    diff: patch

  - name: arch prefix arm64v8 preserved
    current: "arm64v8-1.2.3"
    available: ["arm64v8-1.2.3", "arm64v8-1.2.4", "amd64-1.2.4"]
    want: "arm64v8-1.2.4"
    diff: patch

  - name: arch prefix amd64 with digits in prefix
    current: "amd64-10.8.12"
    available: ["amd64-10.8.12", "amd64-10.8.13"]
    want: "amd64-10.8.13"
    diff: patch

  - name: calendar minor
    current: "2026.1"
    available: ["2025.12", "2026.1", "2026.2"]
    want: "2026.2"
    diff: minor

  - name: calendar year is major
    current: "2024.11"
    available: ["2024.11", "2025.1"]
    want: "2025.1"
    diff: major

  - name: calendar three-part
    current: "2024.11.5"
    available: ["2024.11.5", "2024.11.6", "2024.12.0"]
    want: "2024.12.0"
    diff: minor

  - name: exclude cosign signature tag
    current: "1.2.3"
    available: ["1.2.3", "1.2.4", "sha256-abc123.sig"]
    want: "1.2.4"
    diff: patch

  - name: exclude bare sha256 pointer
    current: "1.2.3"
    available: ["1.2.3", "sha256-deadbeef"]
    want: ""

  - name: unparseable current (latest) yields nothing
    current: "latest"
    available: ["latest", "1.2.3", "1.2.4"]
    want: ""

  - name: ignore non-version junk tags
    current: "1.2.3"
    available: ["1.2.3", "stable", "edge", "nightly", "1.2.4"]
    want: "1.2.4"
    diff: patch

  - name: leading zeros compare numerically (equal -> none)
    current: "1.2.3"
    available: ["1.2.03"]
    want: ""

  - name: no downgrade
    current: "2.0.0"
    available: ["1.9.9", "2.0.0"]
    want: ""

  - name: numeric not lexical (1.10 > 1.9)
    current: "1.9.0"
    available: ["1.9.0", "1.10.0"]
    want: "1.10.0"
    diff: minor

  - name: numeric major double digit
    current: "9.0.0"
    available: ["9.0.0", "10.0.0"]
    want: "10.0.0"
    diff: major

  - name: part-count strictness excludes shorter greater
    current: "1.2.3"
    available: ["1.2.3", "2.0"]
    want: ""

  - name: empty available list
    current: "1.2.3"
    available: []
    want: ""

  - name: current absent from list still finds newer
    current: "1.2.3"
    available: ["1.2.4"]
    want: "1.2.4"
    diff: patch

  - name: only current present
    current: "1.2.3"
    available: ["1.2.3"]
    want: ""

  - name: linuxserver-style alpine with double-digit minor
    current: "1.9.0-alpine"
    available: ["1.9.0-alpine", "1.10.0-alpine", "1.10.0"]
    want: "1.10.0-alpine"
    diff: minor
